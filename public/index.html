<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Hợp Tác Xã Nông Nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <nav class="bg-green-600 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fa-solid fa-leaf mr-2"></i>Hợp Tác Xã 4.0</h1>
            <span class="text-sm bg-green-700 px-3 py-1 rounded-full">Chuyên gia 15 năm kinh nghiệm</span>
        </div>
    </nav>

    <div class="container mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Module 1: Xuất Nhập Kho -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-green-700 border-b pb-2"><i class="fa-solid fa-boxes-stacked mr-2"></i>Nhập / Xuất Hàng</h2>
            <div class="space-y-4">
                <select id="transType" class="w-full p-2 border rounded">
                    <option value="IN">Nhập Hàng (Mua vào)</option>
                    <option value="OUT">Xuất Hàng (Bán ra)</option>
                </select>
                <input type="text" id="prodName" placeholder="Tên sản phẩm (VD: Lúa ST25)" class="w-full p-2 border rounded">
                <div class="flex gap-2">
                    <input type="number" id="prodAmount" placeholder="Số lượng" class="w-1/2 p-2 border rounded">
                    <input type="number" id="prodPrice" placeholder="Giá đơn vị" class="w-1/2 p-2 border rounded">
                </div>
                <button onclick="saveTransaction()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded transition">Lưu Giao Dịch</button>
            </div>
        </div>

        <!-- Module 2: Quản Lý Nhân Công -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-blue-700 border-b pb-2"><i class="fa-solid fa-users mr-2"></i>Chấm Công Nhân Viên</h2>
            <div class="space-y-4">
                <input type="text" id="workerName" placeholder="Họ tên công nhân" class="w-full p-2 border rounded">
                <div class="flex gap-2">
                    <input type="number" id="daysWorked" placeholder="Số ngày làm" class="w-1/2 p-2 border rounded">
                    <input type="number" id="dailySalary" placeholder="Lương/Ngày" class="w-1/2 p-2 border rounded">
                </div>
                <input type="month" id="workMonth" class="w-full p-2 border rounded">
                <button onclick="saveLabor()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded transition">Ghi Nhận Công</button>
            </div>
        </div>

        <!-- Module 3 & 4: Báo Cáo & Hệ Thống -->
        <div class="bg-white p-6 rounded-xl shadow-md md:col-span-2">
            <h2 class="text-xl font-semibold mb-4 text-purple-700 border-b pb-2"><i class="fa-solid fa-chart-line mr-2"></i>Báo Cáo & Kết Quả</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-4 bg-purple-50 rounded-lg text-center">
                    <p class="text-gray-600">Hiệu quả tháng</p>
                    <button onclick="downloadReport()" class="mt-2 bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 w-full">
                        <i class="fa-solid fa-file-excel mr-2"></i>Tải Báo Cáo Excel
                    </button>
                </div>
                <div class="p-4 bg-orange-50 rounded-lg text-center">
                    <p class="text-gray-600">Phân quyền</p>
                    <p class="text-sm text-gray-500 mt-2 italic">Đang hoạt động: <span class="font-bold text-orange-600">Quản trị viên</span></p>
                </div>
                <div class="p-4 bg-gray-50 rounded-lg text-center">
                    <p class="text-gray-600">Trạng thái hệ thống</p>
                    <p class="text-green-600 font-bold mt-2"><i class="fa-solid fa-circle-check"></i> Đang kết nối PC</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function saveTransaction() {
            const data = {
                product_id: 1, // Để đơn giản hóa, em fix cứng ID hoặc anh có thể làm thêm list chọn
                amount: document.getElementById('prodAmount').value,
                price: document.getElementById('prodPrice').value,
                type: document.getElementById('transType').value
            };
            
            const res = await fetch('/inventory/transaction', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) alert('Đã lưu giao dịch kho!');
        }

        async function saveLabor() {
            const data = {
                name: document.getElementById('workerName').value,
                days_worked: document.getElementById('daysWorked').value,
                salary_per_day: document.getElementById('dailySalary').value,
                month: document.getElementById('workMonth').value
            };
            const res = await fetch('/labor/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) alert('Đã chấm công xong!');
        }

        function downloadReport() {
            window.location.href = '/report/excel';
        }
    </script>
</body>
</html>
